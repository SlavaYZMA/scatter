<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>scatter</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #ffffff;
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
  }

  /* ── AUTH ── */
  #auth {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #fff; z-index: 1000;
    transition: opacity 0.5s ease;
  }
  #auth.hidden { opacity: 0; pointer-events: none; }
  #auth input {
    border: none; border-bottom: 1px solid #ddd; outline: none;
    font-family: inherit; font-size: 1.2rem;
    letter-spacing: 0.3em; text-align: center;
    background: transparent; color: #111; width: 200px;
    padding-bottom: 8px; caret-color: #999;
  }
  #auth input::placeholder { color: #ddd; letter-spacing: 0.2em; }

  /* ── CANVAS ── */
  #canvas {
    position: fixed; top: 0; left: 0; right: 0;
    bottom: 80px; /* space for toolbar */
    overflow: hidden;
  }

  /* ── OBJECTS ── */
  .obj {
    position: absolute;
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.82rem; line-height: 1.55; color: #111;
    animation: appear 0.35s ease both;
  }
  @keyframes appear {
    from { opacity: 0; transform: scale(0.92); }
    to   { opacity: 1; transform: scale(1); }
  }
  .obj-text { max-width: min(320px, 80vw); word-break: break-word; white-space: pre-wrap; }
  .obj-image img {
    display: block; max-width: min(260px, 75vw);
    max-height: 200px; object-fit: contain;
  }
  .obj-audio audio { display: block; width: min(260px, 80vw); height: 36px; }

  /* ── TOOLBAR ── */
  #toolbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 80px;
    background: #fff;
    border-top: 1px solid #ebebeb;
    display: flex; align-items: center;
    padding: 0 16px; gap: 10px;
    z-index: 500;
  }

  #toolbar textarea {
    flex: 1;
    height: 48px;
    border: 1px solid #e0e0e0;
    border-radius: 4px;
    padding: 10px 12px;
    font-family: inherit; font-size: 0.82rem; line-height: 1.4;
    color: #111; background: #fafafa;
    resize: none; outline: none;
    caret-color: #999;
    transition: border-color 0.2s;
  }
  #toolbar textarea:focus { border-color: #ccc; background: #fff; }
  #toolbar textarea::placeholder { color: #ccc; }

  /* attach button */
  #attach-btn {
    width: 48px; height: 48px;
    border: 1px solid #e0e0e0; border-radius: 4px;
    background: #fafafa;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  #attach-btn:active { background: #f0f0f0; border-color: #ccc; }
  #attach-btn svg { color: #bbb; }

  /* send button */
  #send-btn {
    width: 48px; height: 48px;
    border: none; border-radius: 4px;
    background: #111;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  #send-btn:active { background: #333; }
  #send-btn svg { color: #fff; }

  /* hidden file input */
  #file-input { display: none; }

  /* char counter */
  #char-count {
    position: fixed; bottom: 88px; right: 16px;
    font-size: 0.6rem; color: #ccc;
    font-family: inherit; z-index: 501;
    transition: opacity 0.2s;
    opacity: 0;
  }
  #char-count.visible { opacity: 1; }
  #char-count.warn { color: #e88; }

  /* ── DROP OVERLAY ── */
  #drop-overlay {
    position: fixed; inset: 0;
    background: rgba(255,255,255,0.93);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; color: #bbb; letter-spacing: 0.2em;
    z-index: 800; pointer-events: none;
    opacity: 0; transition: opacity 0.2s;
  }
  #drop-overlay.active { opacity: 1; pointer-events: auto; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 90px; left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem; color: #999;
    letter-spacing: 0.08em; z-index: 900;
    background: #fff; padding: 6px 12px;
    border: 1px solid #eee; border-radius: 3px;
    opacity: 0; transition: opacity 0.3s;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <input id="auth-input" type="password" placeholder="· · · · ·" autocomplete="off" spellcheck="false">
</div>

<!-- CANVAS -->
<div id="canvas"></div>

<!-- TOOLBAR -->
<div id="toolbar">
  <button id="attach-btn" title="прикрепить файл">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
    </svg>
  </button>
  <textarea id="text-input" placeholder="написать что-нибудь..." maxlength="500" rows="2"></textarea>
  <button id="send-btn" title="отправить">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
    </svg>
  </button>
</div>

<span id="char-count">0 / 500</span>
<input type="file" id="file-input" accept="image/*,audio/*">
<div id="drop-overlay">drop here</div>
<div id="toast"></div>

<script>
const LANG     = (navigator.language || 'en').slice(0, 2);
let authed     = false;
const rendered = new Set();

const authEl      = document.getElementById('auth');
const authInput   = document.getElementById('auth-input');
const canvas      = document.getElementById('canvas');
const textInput   = document.getElementById('text-input');
const sendBtn     = document.getElementById('send-btn');
const attachBtn   = document.getElementById('attach-btn');
const fileInput   = document.getElementById('file-input');
const charCount   = document.getElementById('char-count');
const dropOverlay = document.getElementById('drop-overlay');
const toast       = document.getElementById('toast');

// ── AUTH ──────────────────────────────────────────────────────────────────────
authInput.focus();
authInput.addEventListener('keydown', async e => {
  if (e.key !== 'Enter') return;
  await tryAuth(authInput.value.trim());
});
// mobile: also on input blur after typing
authInput.addEventListener('blur', async () => {
  if (authInput.value.trim()) await tryAuth(authInput.value.trim());
});

async function tryAuth(code) {
  const { ok } = await post('/api/auth', { code });
  if (ok) {
    authed = true;
    authEl.classList.add('hidden');
    setTimeout(() => authEl.remove(), 600);
    startPolling();
  } else {
    authInput.value = '';
    authInput.style.color = '#e88';
    setTimeout(() => { authInput.style.color = ''; authInput.focus(); }, 600);
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderObject(obj) {
  if (rendered.has(obj.id)) return;
  rendered.add(obj.id);

  const el = document.createElement('div');
  el.className = `obj obj-${obj.type}`;
  el.id = `obj-${obj.id}`;
  el.style.left = obj.x + 'px';
  el.style.top  = obj.y + 'px';

  if (obj.type === 'text') {
    el.textContent = obj.content;
  } else if (obj.type === 'image') {
    const img = document.createElement('img');
    img.src = obj.content; img.draggable = false;
    el.appendChild(img);
  } else if (obj.type === 'audio') {
    const audio = document.createElement('audio');
    audio.controls = true; audio.src = obj.content;
    el.appendChild(audio);
  }
  canvas.appendChild(el);
}

// ── POLLING ───────────────────────────────────────────────────────────────────
function startPolling() {
  fetchObjects();
  setInterval(fetchObjects, 8000);
}

async function fetchObjects() {
  try {
    const objs = await (await fetch(`/api/objects?lang=${LANG}`)).json();
    const ids = new Set(objs.map(o => o.id));
    rendered.forEach(id => {
      if (!ids.has(id)) {
        document.getElementById(`obj-${id}`)?.remove();
        rendered.delete(id);
      }
    });
    objs.forEach(renderObject);
  } catch {}
}

// ── SEND TEXT ─────────────────────────────────────────────────────────────────
textInput.addEventListener('input', () => {
  const len = textInput.value.length;
  charCount.textContent = `${len} / 500`;
  charCount.classList.toggle('visible', len > 0);
  charCount.classList.toggle('warn', len > 450);
});

async function sendText() {
  const text = textInput.value.trim();
  if (!text) return;
  textInput.value = '';
  charCount.classList.remove('visible');
  try {
    const res = await fetch('/api/post/text', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, vw: window.innerWidth, vh: window.innerHeight - 80 })
    });
    if (!res.ok) return showToast('слишком длинно');
    renderObject(await res.json());
  } catch { showToast('ошибка'); }
}

sendBtn.addEventListener('click', sendText);

textInput.addEventListener('keydown', e => {
  // desktop: Enter sends, Shift+Enter = newline
  if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 600) {
    e.preventDefault();
    sendText();
  }
});

// ── ATTACH FILE ───────────────────────────────────────────────────────────────
attachBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) uploadFile(fileInput.files[0]);
  fileInput.value = '';
});

// ── DRAG & DROP ───────────────────────────────────────────────────────────────
document.addEventListener('dragover', e => { e.preventDefault(); dropOverlay.classList.add('active'); });
document.addEventListener('dragleave', e => { if (!e.relatedTarget) dropOverlay.classList.remove('active'); });
document.addEventListener('drop', async e => {
  e.preventDefault(); dropOverlay.classList.remove('active');
  if (!authed) return;
  const file = e.dataTransfer.files[0];
  if (file) uploadFile(file);
});

// ── PASTE ─────────────────────────────────────────────────────────────────────
document.addEventListener('paste', async e => {
  if (!authed) return;
  const item = [...e.clipboardData.items].find(i => i.type.startsWith('image/'));
  if (item) uploadFile(item.getAsFile());
});

async function uploadFile(file) {
  if (file.size > 2 * 1024 * 1024) return showToast('файл слишком большой (макс 2mb)');
  const fd = new FormData();
  fd.append('file', file);
  fd.append('vw', window.innerWidth);
  fd.append('vh', window.innerHeight - 80);
  try {
    const res = await fetch('/api/post/file', { method: 'POST', body: fd });
    if (!res.ok) return showToast('неподдерживаемый формат');
    renderObject(await res.json());
  } catch { showToast('ошибка загрузки'); }
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
async function post(url, data) {
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  return res.json();
}

let toastTimer;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
}
</script>
</body>
</html>

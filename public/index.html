<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>scatter</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #fff;
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
  }

  /* ── SCREENS ── */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #fff; z-index: 1000;
    transition: opacity 0.4s ease;
    gap: 32px;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }
  .screen.gone { display: none; }

  /* AUTH */
  #auth input {
    border: none; border-bottom: 1px solid #ddd; outline: none;
    font-family: inherit; font-size: 1.2rem;
    letter-spacing: 0.3em; text-align: center;
    background: transparent; color: #111; width: 200px;
    padding-bottom: 8px; caret-color: #999;
  }
  #auth input::placeholder { color: #ddd; }

  /* LANG PICKER */
  #lang-picker h2 {
    font-size: 0.7rem; color: #bbb;
    letter-spacing: 0.15em; text-transform: uppercase;
    font-weight: normal;
  }

  #lang-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    max-width: 360px;
    width: 90vw;
  }

  .lang-btn {
    border: 1px solid #e8e8e8; border-radius: 4px;
    padding: 10px 4px;
    font-family: inherit; font-size: 0.72rem;
    color: #555; background: #fafafa;
    cursor: pointer; text-align: center;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    line-height: 1.3;
  }
  .lang-btn:hover { border-color: #ccc; color: #111; }
  .lang-btn.selected { border-color: #111; background: #111; color: #fff; }

  #lang-confirm {
    border: none; background: none;
    font-family: inherit; font-size: 0.7rem;
    color: #bbb; letter-spacing: 0.1em;
    cursor: pointer; padding: 4px 0;
    border-bottom: 1px solid #e0e0e0;
    transition: color 0.2s, border-color 0.2s;
  }
  #lang-confirm:hover { color: #111; border-color: #111; }

  /* ── CANVAS ── */
  #canvas {
    position: fixed; top: 0; left: 0; right: 0; bottom: 80px;
    overflow: auto; -webkit-overflow-scrolling: touch;
  }
  #canvas-inner { position: relative; width: 100%; min-height: 100%; }

  /* ── OBJECTS ── */
  .obj {
    position: absolute;
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.82rem; line-height: 1.55; color: #111;
    animation: appear 0.35s ease both;
  }
  @keyframes appear {
    from { opacity: 0; transform: scale(0.92); }
    to   { opacity: 1; transform: scale(1); }
  }
  .obj-text { max-width: min(320px, 80vw); word-break: break-word; white-space: pre-wrap; }
  .obj-image img { display: block; max-width: min(260px, 75vw); max-height: 200px; object-fit: contain; }
  .obj-audio audio { display: block; width: min(260px, 80vw); height: 36px; }

  /* ── TOOLBAR ── */
  #toolbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 80px; background: #fff;
    border-top: 1px solid #ebebeb;
    display: flex; align-items: center;
    padding: 0 12px; gap: 8px; z-index: 500;
  }
  #toolbar textarea {
    flex: 1; height: 48px;
    border: 1px solid #e0e0e0; border-radius: 4px;
    padding: 10px 12px;
    font-family: inherit; font-size: 0.82rem; line-height: 1.4;
    color: #111; background: #fafafa;
    resize: none; outline: none; caret-color: #999;
  }
  #toolbar textarea:focus { border-color: #ccc; background: #fff; }
  #toolbar textarea::placeholder { color: #ccc; }

  #attach-btn {
    width: 48px; height: 48px;
    border: 1px solid #e0e0e0; border-radius: 4px; background: #fafafa;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  #attach-btn:active { background: #f0f0f0; }
  #attach-btn svg { color: #bbb; }

  #send-btn {
    width: 48px; height: 48px; border: none;
    border-radius: 4px; background: #111;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  #send-btn:active { background: #333; }
  #send-btn svg { color: #fff; }

  #file-input { display: none; }

  /* ── LANG INDICATOR (top right) ── */
  #lang-indicator {
    position: fixed; top: 14px; right: 14px;
    font-size: 0.62rem; color: #ccc;
    letter-spacing: 0.08em; z-index: 600;
    cursor: pointer; display: none;
    -webkit-tap-highlight-color: transparent;
  }
  #lang-indicator.visible { display: block; }
  #lang-indicator:hover { color: #999; }

  /* ── DROP ── */
  #drop-overlay {
    position: fixed; inset: 0;
    background: rgba(255,255,255,0.93);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; color: #bbb; letter-spacing: 0.2em;
    z-index: 800; pointer-events: none;
    opacity: 0; transition: opacity 0.2s;
  }
  #drop-overlay.active { opacity: 1; pointer-events: auto; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 90px; left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem; color: #999;
    z-index: 900; background: #fff;
    padding: 6px 12px; border: 1px solid #eee; border-radius: 3px;
    opacity: 0; transition: opacity 0.3s; white-space: nowrap;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- SCREEN 1: PASSWORD -->
<div class="screen" id="auth">
  <input id="auth-input" type="password" placeholder="· · · · ·" autocomplete="off" spellcheck="false">
</div>

<!-- SCREEN 2: LANGUAGE PICKER -->
<div class="screen gone" id="lang-picker">
  <h2 id="lang-title">choose your language</h2>
  <div id="lang-grid"></div>
  <button id="lang-confirm" disabled>continue →</button>
</div>

<!-- CANVAS -->
<div id="canvas"><div id="canvas-inner"></div></div>

<!-- LANG INDICATOR -->
<div id="lang-indicator"></div>

<!-- TOOLBAR -->
<div id="toolbar">
  <button id="attach-btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
    </svg>
  </button>
  <textarea id="text-input" rows="2" maxlength="500"></textarea>
  <button id="send-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
    </svg>
  </button>
</div>

<input type="file" id="file-input" accept="image/*,audio/*">
<div id="drop-overlay">drop file here</div>
<div id="toast"></div>

<script>
// ── LANGUAGES ─────────────────────────────────────────────────────────────────
const LANGUAGES = [
  { code: 'en', label: 'English' },
  { code: 'ru', label: 'Русский' },
  { code: 'de', label: 'Deutsch' },
  { code: 'fr', label: 'Français' },
  { code: 'es', label: 'Español' },
  { code: 'it', label: 'Italiano' },
  { code: 'pt', label: 'Português' },
  { code: 'pl', label: 'Polski' },
  { code: 'nl', label: 'Nederlands' },
  { code: 'tr', label: 'Türkçe' },
  { code: 'uk', label: 'Українська' },
  { code: 'sv', label: 'Svenska' },
  { code: 'ar', label: 'العربية' },
  { code: 'zh', label: '中文' },
  { code: 'ja', label: '日本語' },
  { code: 'ko', label: '한국어' },
];

// UI strings per language
const UI = {
  en: { title: 'choose your language', confirm: 'continue →', placeholder: 'write something...', drop: 'drop file here' },
  ru: { title: 'выберите язык', confirm: 'продолжить →', placeholder: 'написать что-нибудь...', drop: 'перетащи файл сюда' },
  de: { title: 'Sprache wählen', confirm: 'weiter →', placeholder: 'etwas schreiben...', drop: 'Datei hier ablegen' },
  fr: { title: 'choisir la langue', confirm: 'continuer →', placeholder: 'écrire quelque chose...', drop: 'déposer ici' },
  es: { title: 'elige tu idioma', confirm: 'continuar →', placeholder: 'escribe algo...', drop: 'soltar archivo aquí' },
  it: { title: 'scegli la lingua', confirm: 'continua →', placeholder: 'scrivi qualcosa...', drop: 'trascina qui' },
  pt: { title: 'escolha o idioma', confirm: 'continuar →', placeholder: 'escreva algo...', drop: 'soltar aqui' },
  pl: { title: 'wybierz język', confirm: 'kontynuuj →', placeholder: 'napisz coś...', drop: 'upuść plik tutaj' },
  nl: { title: 'kies je taal', confirm: 'doorgaan →', placeholder: 'schrijf iets...', drop: 'bestand neerzetten' },
  tr: { title: 'dil seç', confirm: 'devam →', placeholder: 'bir şeyler yaz...', drop: 'dosyayı buraya bırak' },
  uk: { title: 'оберіть мову', confirm: 'продовжити →', placeholder: 'написати щось...', drop: 'перетягни файл сюди' },
  sv: { title: 'välj språk', confirm: 'fortsätt →', placeholder: 'skriv något...', drop: 'släpp fil här' },
  ar: { title: 'اختر لغتك', confirm: '← متابعة', placeholder: 'اكتب شيئاً...', drop: 'أسقط الملف هنا' },
  zh: { title: '选择语言', confirm: '继续 →', placeholder: '写点什么...', drop: '拖放文件到这里' },
  ja: { title: '言語を選んでください', confirm: '続ける →', placeholder: '何か書いてください...', drop: 'ファイルをドロップ' },
  ko: { title: '언어를 선택하세요', confirm: '계속 →', placeholder: '무언가 써보세요...', drop: '파일을 여기에 놓으세요' },
};

// ── STATE ─────────────────────────────────────────────────────────────────────
let userLang = null; // язык пользователя (пишет И читает на нём)
let authed   = false;
const store  = new Map();

// ── ELEMENTS ──────────────────────────────────────────────────────────────────
const authScreen   = document.getElementById('auth');
const authInput    = document.getElementById('auth-input');
const langScreen   = document.getElementById('lang-picker');
const langGrid     = document.getElementById('lang-grid');
const langTitle    = document.getElementById('lang-title');
const langConfirm  = document.getElementById('lang-confirm');
const canvasInner  = document.getElementById('canvas-inner');
const textInput    = document.getElementById('text-input');
const sendBtn      = document.getElementById('send-btn');
const attachBtn    = document.getElementById('attach-btn');
const fileInput    = document.getElementById('file-input');
const dropOverlay  = document.getElementById('drop-overlay');
const langIndicator= document.getElementById('lang-indicator');
const toast        = document.getElementById('toast');

// ── AUTH ──────────────────────────────────────────────────────────────────────
authInput.focus();
authInput.addEventListener('keydown', async e => {
  if (e.key === 'Enter') await tryAuth(authInput.value.trim());
});
authInput.addEventListener('blur', async () => {
  if (authInput.value.trim()) await tryAuth(authInput.value.trim());
});

async function tryAuth(code) {
  const { ok } = await apiPost('/api/auth', { code });
  if (ok) {
    authed = true;
    authScreen.classList.add('hidden');
    setTimeout(() => {
      authScreen.classList.add('gone');
      showLangPicker();
    }, 450);
  } else {
    authInput.value = '';
    authInput.style.color = '#e88';
    setTimeout(() => { authInput.style.color = ''; authInput.focus(); }, 600);
  }
}

// ── LANG PICKER ───────────────────────────────────────────────────────────────
function showLangPicker() {
  langScreen.classList.remove('gone');
  // build grid
  langGrid.innerHTML = '';
  LANGUAGES.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'lang-btn';
    btn.textContent = l.label;
    btn.dataset.code = l.code;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      userLang = l.code;
      langConfirm.disabled = false;
      // update picker UI to selected language
      const u = UI[l.code] || UI['en'];
      langTitle.textContent = u.title;
      langConfirm.textContent = u.confirm;
    });
    langGrid.appendChild(btn);
  });
}

langConfirm.addEventListener('click', () => {
  if (!userLang) return;
  langScreen.classList.add('hidden');
  setTimeout(() => {
    langScreen.classList.add('gone');
    startApp();
  }, 450);
});

// ── START APP ─────────────────────────────────────────────────────────────────
function startApp() {
  const u = UI[userLang] || UI['en'];
  textInput.placeholder = u.placeholder;
  document.getElementById('drop-overlay').textContent = u.drop;

  // show lang indicator top-right — click to reload and repick
  const lang = LANGUAGES.find(l => l.code === userLang);
  langIndicator.textContent = lang ? lang.label : userLang;
  langIndicator.classList.add('visible');
  langIndicator.title = 'change language';
  langIndicator.addEventListener('click', () => location.reload());

  canvasInner.style.height = (window.innerHeight - 80) + 'px';
  startPolling();
}

// ── TRANSLATE ─────────────────────────────────────────────────────────────────
async function clientTranslate(text, sourceLang) {
  if (!sourceLang || sourceLang === userLang) return null;
  try {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sourceLang}|${userLang}`;
    const res = await fetch(url);
    if (!res.ok) return null;
    const data = await res.json();
    if (data.responseStatus === 200) return data.responseData.translatedText;
    return null;
  } catch { return null; }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function expandCanvas(x, y, w, h) {
  const curH = parseInt(canvasInner.style.height) || (window.innerHeight - 80);
  const curW = parseInt(canvasInner.style.minWidth) || window.innerWidth;
  if (y + h + 40 > curH) canvasInner.style.height = (y + h + 40) + 'px';
  if (x + w + 40 > curW) canvasInner.style.minWidth = (x + w + 40) + 'px';
}

async function renderObject(obj) {
  if (store.has(obj.id)) return;
  expandCanvas(obj.x, obj.y, obj.w, obj.h);

  const el = document.createElement('div');
  el.className = `obj obj-${obj.type}`;
  el.id = `obj-${obj.id}`;
  el.style.left = obj.x + 'px';
  el.style.top  = obj.y + 'px';

  if (obj.type === 'text') {
    const translated = await clientTranslate(obj.content, obj.sourceLang);
    el.textContent = translated || obj.content;
  } else if (obj.type === 'image') {
    const img = document.createElement('img');
    img.src = obj.content; img.draggable = false;
    el.appendChild(img);
  } else if (obj.type === 'audio') {
    const audio = document.createElement('audio');
    audio.controls = true; audio.src = obj.content;
    el.appendChild(audio);
  }

  store.set(obj.id, { obj, el });
  canvasInner.appendChild(el);
}

// ── POLLING ───────────────────────────────────────────────────────────────────
function startPolling() {
  fetchObjects();
  setInterval(fetchObjects, 8000);
}

async function fetchObjects() {
  try {
    const objs = await (await fetch('/api/objects')).json();
    const ids = new Set(objs.map(o => o.id));
    store.forEach((_, id) => {
      if (!ids.has(id)) {
        document.getElementById(`obj-${id}`)?.remove();
        store.delete(id);
      }
    });
    for (const obj of objs) await renderObject(obj);
  } catch {}
}

// ── SEND TEXT ─────────────────────────────────────────────────────────────────
async function sendText() {
  const text = textInput.value.trim();
  if (!text) return;
  textInput.value = '';
  try {
    const res = await fetch('/api/post/text', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, lang: userLang, vw: window.innerWidth, vh: window.innerHeight - 80 })
    });
    if (!res.ok) return showToast('too long');
    await renderObject(await res.json());
  } catch { showToast('error'); }
}

sendBtn.addEventListener('click', sendText);
textInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 600) {
    e.preventDefault(); sendText();
  }
});

// ── ATTACH ────────────────────────────────────────────────────────────────────
attachBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) uploadFile(fileInput.files[0]);
  fileInput.value = '';
});
document.addEventListener('dragover', e => { e.preventDefault(); dropOverlay.classList.add('active'); });
document.addEventListener('dragleave', e => { if (!e.relatedTarget) dropOverlay.classList.remove('active'); });
document.addEventListener('drop', async e => {
  e.preventDefault(); dropOverlay.classList.remove('active');
  if (!authed) return;
  if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]);
});
document.addEventListener('paste', async e => {
  if (!authed) return;
  const item = [...e.clipboardData.items].find(i => i.type.startsWith('image/'));
  if (item) uploadFile(item.getAsFile());
});

async function uploadFile(file) {
  if (file.size > 2 * 1024 * 1024) return showToast('max 2mb');
  const fd = new FormData();
  fd.append('file', file); fd.append('vw', window.innerWidth); fd.append('vh', window.innerHeight - 80);
  try {
    const res = await fetch('/api/post/file', { method: 'POST', body: fd });
    if (!res.ok) return showToast('unsupported format');
    await renderObject(await res.json());
  } catch { showToast('upload error'); }
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
async function apiPost(url, data) {
  const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
  return res.json();
}
let toastTimer;
function showToast(msg) {
  toast.textContent = msg; toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
}
</script>
</body>
</html>
